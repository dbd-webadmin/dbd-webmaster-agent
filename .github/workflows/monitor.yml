name: Monitor Sites

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run checks
        run: node monitor.js

      - name: Save results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add results.json
          git diff --staged --quiet || git commit -m "Monitor update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
