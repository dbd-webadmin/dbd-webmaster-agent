name: Update Plugins via SSH

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain name (e.g. destinationbydesign.com)'
        required: true
        default: 'destinationbydesign.com'
      plugin:
        description: 'Plugin slug to update, "all" for all plugins, or "core" to update WordPress itself'
        required: true
        default: 'all'
      host:
        description: 'Host type: hostinger or wpengine'
        required: false
        default: 'hostinger'
      install_name:
        description: 'WP Engine install name (WP Engine sites only)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 93.127.218.76 >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan ${{ github.event.inputs.install_name }}.ssh.wpengine.net >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve SSH target
        id: target
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          HOST_TYPE="${{ github.event.inputs.host }}"
          INSTALL="${{ github.event.inputs.install_name }}"

          if [ "$HOST_TYPE" = "wpengine" ] && [ -n "$INSTALL" ]; then
            SSH_USER="$INSTALL"
            SSH_HOST="${INSTALL}.ssh.wpengine.net"
            SSH_PORT="22"
            WP_PATH="/home/wpe-user/sites/${INSTALL}"
          else
            SSH_USER="u995288748"
            SSH_HOST="93.127.218.76"
            SSH_PORT="65002"
            WP_PATH="/home/u995288748/domains/${DOMAIN}/public_html"
          fi

          EXISTS=$(ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" "[ -f '${WP_PATH}/wp-config.php' ] && echo yes || echo no")
          if [ "$EXISTS" != "yes" ]; then
            echo "ERROR: WordPress not found at ${WP_PATH} on ${SSH_HOST}"
            exit 1
          fi

          echo "ssh_user=${SSH_USER}" >> $GITHUB_OUTPUT
          echo "ssh_host=${SSH_HOST}" >> $GITHUB_OUTPUT
          echo "ssh_port=${SSH_PORT}" >> $GITHUB_OUTPUT
          echo "wp_path=${WP_PATH}" >> $GITHUB_OUTPUT

      - name: List available updates (before)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ steps.target.outputs.ssh_port }} \
            ${{ steps.target.outputs.ssh_user }}@${{ steps.target.outputs.ssh_host }} \
            "wp plugin list --path='${{ steps.target.outputs.wp_path }}' --update=available --fields=name,version,update_version --format=table 2>/dev/null" || true

      - name: Run update
        run: |
          PLUGIN="${{ github.event.inputs.plugin }}"
          WP_PATH="${{ steps.target.outputs.wp_path }}"
          SSH_ARGS="-i ~/.ssh/id_ed25519 -p ${{ steps.target.outputs.ssh_port }} ${{ steps.target.outputs.ssh_user }}@${{ steps.target.outputs.ssh_host }}"

          if [ "$PLUGIN" = "core" ]; then
            ssh $SSH_ARGS "wp core update --path='${WP_PATH}' 2>&1"
          elif [ "$PLUGIN" = "all" ]; then
            ssh $SSH_ARGS "wp plugin update --all --path='${WP_PATH}' 2>&1"
          else
            ssh $SSH_ARGS "wp plugin update '${PLUGIN}' --path='${WP_PATH}' 2>&1"
          fi

      - name: Confirm updated versions (after)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ steps.target.outputs.ssh_port }} \
            ${{ steps.target.outputs.ssh_user }}@${{ steps.target.outputs.ssh_host }} \
            "wp plugin list --path='${{ steps.target.outputs.wp_path }}' --fields=name,version,status --format=table 2>/dev/null" || true
