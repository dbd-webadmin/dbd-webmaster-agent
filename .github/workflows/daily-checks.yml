name: Daily Stack Check

on:
  schedule:
    - cron: '11 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check site stacks
        run: node scripts/check-stack.js

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add stack-results.json
          git diff --staged --quiet || git commit -m "Daily stack check $(date -u +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push && break
            echo "Push rejected (attempt $i), retrying..."
            sleep $(( (RANDOM % 10) + 1 ))
          done
