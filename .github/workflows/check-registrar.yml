name: Check Domain Registrar & Cloudflare

on:
  schedule:
    - cron: '29 10 * * 1'  # Every Monday, just past 10am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check registrar & Cloudflare status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node scripts/check-registrar.js

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add registrar-results.json
          git diff --staged --quiet || git commit -m "Registrar check $(date -u +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push && break
            echo "Push rejected (attempt $i), retrying..."
            sleep $(( (RANDOM % 10) + 1 ))
          done
