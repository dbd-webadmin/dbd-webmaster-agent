name: Check Plugin & Core Updates

on:
  schedule:
    - cron: '23 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 93.127.218.76 >> ~/.ssh/known_hosts 2>/dev/null || true
          for name in $(node -e "require('./sites.json').sites.filter(s => s.host === 'WP Engine' && s.sshInstallName).forEach(s => console.log(s.sshInstallName))"); do
            ssh-keyscan "${name}.ssh.wpengine.net" >> ~/.ssh/known_hosts 2>/dev/null || true
          done
          exit 0 # a keyscan blip here is a nice-to-have miss, not a job failure — every real SSH call already disables strict host-key checking

      - name: Check for updates
        run: SSH_KEY_PATH=~/.ssh/id_ed25519 node scripts/check-updates.js

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add update-status/
          git diff --staged --quiet || git commit -m "Update status check $(date -u +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push && break
            echo "Push rejected (attempt $i), retrying..."
            sleep $(( (RANDOM % 10) + 1 ))
          done
